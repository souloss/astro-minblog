<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人技术博客系统架构 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --surface2: #f3f2ef;
  --border: #e5e3de;
  --border2: #d0cec8;
  --text: #1a1916;
  --text2: #5c5a55;
  --text3: #9b9892;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', 'Noto Sans SC', sans-serif;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-hover: 0 2px 8px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
}

/* ─── HEADER ─── */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 32px 40px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.site-header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
}
.site-header .meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  letter-spacing: 0.05em;
}
.view-toggle {
  display: flex;
  gap: 6px;
  margin-top: 16px;
}
.view-btn {
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.view-btn.active {
  background: var(--text);
  color: white;
  border-color: var(--text);
}
.view-btn:hover:not(.active) {
  background: var(--surface2);
}

/* ─── OVERVIEW MODE ─── */
#overview-view {
  padding: 32px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  max-width: 1400px;
  margin: 0 auto;
}

.layer-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
  border-left: 3px solid var(--accent-color);
}
.layer-pill:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-1px);
}
.layer-pill .pill-icon {
  font-size: 20px;
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: color-mix(in srgb, var(--accent-color) 10%, transparent);
  border-radius: 8px;
}
.layer-pill .pill-info { flex: 1; min-width: 0; }
.layer-pill .pill-code {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent-color);
  letter-spacing: 0.08em;
  margin-bottom: 2px;
}
.layer-pill .pill-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.layer-pill .pill-desc {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.layer-pill .pill-arrow {
  font-size: 12px;
  color: var(--text3);
  flex-shrink: 0;
}

/* ─── DETAIL MODE ─── */
#detail-view {
  max-width: 980px;
  margin: 0 auto;
  padding: 32px 40px 80px;
  display: none;
}
#detail-view.active { display: block; }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  padding: 6px 0;
  margin-bottom: 24px;
  letter-spacing: 0.04em;
  border: none;
  background: none;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--text); }

/* ─── LAYER CARD ─── */
.layer-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
  border-top: 3px solid var(--accent-color);
  scroll-margin-top: 120px;
}

.layer-header {
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.layer-header:hover { background: var(--surface2); }

.layer-icon-wrap {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  background: color-mix(in srgb, var(--accent-color) 12%, transparent);
  flex-shrink: 0;
}
.layer-meta { flex: 1; min-width: 0; }
.layer-code {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent-color);
  letter-spacing: 0.1em;
  margin-bottom: 2px;
}
.layer-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}
.layer-tagline {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}
.expand-icon {
  font-size: 12px;
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.layer-card.open .expand-icon { transform: rotate(90deg); }

.layer-body {
  display: none;
  padding: 0 24px 24px;
  border-top: 1px solid var(--border);
}
.layer-card.open .layer-body { display: block; }

/* ─── SECTIONS ─── */
.section {
  margin-top: 20px;
}
.section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── ITEMS ─── */
.item-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}
.item-grid.wide { grid-template-columns: 1fr; }
.item-grid.two { grid-template-columns: 1fr 1fr; }

.item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.12s;
  position: relative;
}
.item:hover { border-color: var(--accent-color); background: color-mix(in srgb, var(--accent-color) 5%, var(--surface2)); }
.item-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}
.item-name .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-color);
  flex-shrink: 0;
}
.item-desc {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
  line-height: 1.5;
  display: none;
}
.item.expanded .item-desc { display: block; }
.item-expand-hint {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  margin-top: 4px;
  letter-spacing: 0.04em;
}
.item.expanded .item-expand-hint { display: none; }

/* ─── TAGS ─── */
.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag {
  font-size: 11px;
  font-family: var(--mono);
  padding: 3px 8px;
  border-radius: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  letter-spacing: 0.02em;
}
.tag.accent {
  background: color-mix(in srgb, var(--accent-color) 10%, transparent);
  border-color: color-mix(in srgb, var(--accent-color) 25%, transparent);
  color: var(--accent-color);
}
.tag.warn {
  background: #fff8e6;
  border-color: #f5d87a;
  color: #9a6700;
}
.tag.ok {
  background: #f0faf4;
  border-color: #a3d9b8;
  color: #1a7a3e;
}

/* ─── CALLOUT ─── */
.callout {
  border-left: 3px solid var(--accent-color);
  padding: 10px 14px;
  background: color-mix(in srgb, var(--accent-color) 6%, var(--surface2));
  border-radius: 0 8px 8px 0;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  margin-top: 10px;
}
.callout strong { color: var(--text); }

/* ─── DECISION TABLE ─── */
.decision-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
.decision-table th {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text3);
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.decision-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  vertical-align: top;
}
.decision-table td:first-child {
  font-weight: 500;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
}
.decision-table tr:last-child td { border-bottom: none; }
.decision-table tr:hover td { background: var(--surface2); }

/* ─── BREADCRUMB NAV ─── */
.layer-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 24px;
}
.nav-chip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.04em;
}
.nav-chip:hover, .nav-chip.active {
  border-color: var(--accent-color);
  color: var(--accent-color);
  background: color-mix(in srgb, var(--accent-color) 8%, transparent);
}

/* ─── AI BADGE ─── */
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 4px;
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  color: white;
  letter-spacing: 0.04em;
  vertical-align: middle;
  margin-left: 4px;
}

/* ─── HIDDEN ─── */
.hidden { display: none !important; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ─── DIVIDER ─── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}
</style>
</head>
<body>

<div class="site-header">
  <h1>个人技术博客系统架构</h1>
  <div class="meta">PERSONAL TECH BLOG · SYSTEM DESIGN REFERENCE · 2026</div>
  <div class="view-toggle">
    <button class="view-btn active" onclick="switchView('overview')">概览模式</button>
    <button class="view-btn" onclick="switchView('detail')">详细模式</button>
  </div>
</div>

<!-- OVERVIEW -->
<div id="overview-view"></div>

<!-- DETAIL -->
<div id="detail-view">
  <button class="back-btn" onclick="switchView('overview')">← 返回概览</button>
  <div class="layer-nav" id="layer-nav"></div>
  <div id="layers-container"></div>
</div>

<script>
// ════════════════════════════════════════
// DATA
// ════════════════════════════════════════
const layers = [
  {
    code: "L1",
    name: "内容模型层",
    icon: "📐",
    color: "#2563eb",
    tagline: "内容是什么、如何组织与分类、元信息如何管理",
    sections: [
      {
        title: "内容实体类型",

          { name: "普通文章 Post", desc: "主要内容单元。包含标题、正文（Markdown/MDX）、封面图、元信息。适合教程、深度分析、观点类内容。" },
          { name: "系列文章 Series", desc: "多篇有序文章构成的集合，有明确的阅读路径。如「React 深入系列」。系列页面应有完整的进度导航与学习路线图。" },
          { name: "交互式文章 Interactive Post", desc: "嵌入可交互的组件（代码沙盒、实时 Demo、可调参数的图表、动画演示）。使用 MDX 插入 React 组件。技术博客差异化的重要手段。" },
          { name: "TIL / 短笔记", desc: "Today I Learned，记录碎片知识点。字数少、频率高。避免大文章门槛，形成持续输出节奏。" },
          { name: "项目展示 Showcase", desc: "展示个人项目、开源贡献。包含技术栈、解决的问题、演示链接、仓库链接、开发历程。" },
          { name: "读书笔记 / 书摘", desc: "对书籍、论文、报告的结构化摘录与评论。引用规范参考学术写作，注明来源。" },
          { name: "外链内容 Curated Links", desc: "精选外部链接合集（Weekly Picks 等）。提供简短评注，体现选题视角。避免单纯搬运无价值内容。" },
          { name: "FAQ / 知识库", desc: "对读者高频问题的结构化整理。可由评论沉淀而来，也可主动构建。对 SEO 有显著价值（FAQPage Schema）。" },
          { name: "通知 / 公告", desc: "博客更新说明、停更公告、重大变更通知。独立于文章流，不影响内容 Feed。" },
        ]
      },
      {
        title: "内容分类与组织",
        items: [
          { name: "标签 Tag", desc: "扁平化分类，一篇文章可有多个标签。标签页需有聚合列表，避免孤立标签（无内容的标签不应展示）。标签命名规范：全小写、连字符分隔。" },
          { name: "专题 Topic / 分类 Category", desc: "层级化分类，粒度比标签粗。适合按技术领域（Frontend / Backend / DevOps）组织。避免分类过细导致内容稀疏。" },
          { name: "内容关系图", desc: "文章间的语义关系：belongs_to（属于系列）/ references（引用来源）/ derived_from（基于讨论衍生）/ related_to（相关推荐）/ supersedes（替代旧文章）/ updates（追更记录）。这些关系驱动「相关文章」、系列导航等功能。" },
          { name: "内容状态", desc: "草稿 Draft / 待审 Review / 已发布 Published / 已归档 Archived / 已废弃 Deprecated。废弃文章不应删除，应保留并展示替代链接，避免死链。" },

      },
      {
        title: "元信息规范 Frontmatter",

          { name: "时间元数据", desc: "publishedAt（发布时间）、updatedAt（最后实质性更新时间）。区分「小修正」与「实质性更新」，只有后者才更新 updatedAt 并通知订阅者。" },
          { name: "分类元数据", desc: "tags（数组）、series（所属系列 slug）、topic（所属分类）、status（内容状态）。" },
          { name: "读者元数据", desc: "difficulty（初级/中级/高级）、readingTime（估计阅读时长，可自动计算）、audience（目标读者描述）。降低读者决策成本。" },
          { name: "版权与声明", desc: "license（CC BY 4.0 等）、aiUsage（是否使用 AI，如何使用）、canonicalUrl（跨平台发布时指向原始地址）。" },

          { name: "版本过期管理", desc: "文章可标注 techVersions（涉及的技术版本）。构建时检测版本是否过时（对比 npm registry / GitHub releases），超期自动在文章顶部展示提示 Banner，并创建 GitHub Issue 提醒更新。" },

      }

  {

          { name: "AI 摘要生成", desc: "自动生成文章摘要（description 字段），供 SEO 和列表页展示。可配置：自动生成 / 人工输入 / 混合（AI 草稿，人工润色）。构建时检测 description 为空则触发生成。", ai: true },

          { name: "SEO 关键词建议", desc: "构建前调用 AI 分析文章，推荐可优化的关键词布局，检查标题、摘要、H2 是否包含目标关键词。", ai: true },

      },
      {
        title: "内容质量保证",

          { name: "Markdown 格式规范", desc: "markdownlint：检查 Markdown 语法规范。配合 prettier 统一格式。CI 中执行，不合规则阻断提交。" },
          { name: "代码示例验证", desc: "文章中的代码示例通过测试文件引用，而非直接嵌入。构建时运行示例代码测试，确保代码示例不会过期报错。" },

// ════════════════════════════════════════
// RENDER OVERVIEW
// ════════════════════════════════════════
function renderOverview() {
  const container = document.getElementById('overview-view');
  container.innerHTML = layers.map((l, i) => `
    <div class="layer-pill" style="--accent-color: ${l.color}" onclick="goToDetail(${i})">
      <div class="pill-icon">${l.icon}</div>
      <div class="pill-info">
        <div class="pill-code">${l.code}${l.ai ? ' · AI' : ''}</div>
        <div class="pill-name">${l.name}</div>
        <div class="pill-desc">${l.tagline}</div>
      </div>
      <div class="pill-arrow">›</div>
    </div>
  `).join('');
}

// ════════════════════════════════════════
// RENDER DETAIL
// ════════════════════════════════════════
function renderDetail() {
  // nav
  const nav = document.getElementById('layer-nav');
  nav.innerHTML = layers.map((l, i) => `
    <span class="nav-chip" id="nav-${i}" style="--accent-color: ${l.color}" onclick="scrollToLayer(${i})">${l.code} ${l.name}</span>
  `).join('');

  // cards
  const container = document.getElementById('layers-container');
  container.innerHTML = layers.map((l, i) => `
    <div class="layer-card" id="layer-${i}" style="--accent-color: ${l.color}">
      <div class="layer-header" onclick="toggleLayer(${i})">
        <div class="layer-icon-wrap">${l.icon}</div>
        <div class="layer-meta">
          <div class="layer-code">${l.code}${l.ai ? ' <span class="ai-badge">✦ AI</span>' : ''}</div>
          <div class="layer-name">${l.name}</div>
          <div class="layer-tagline">${l.tagline}</div>
        </div>
        <div class="expand-icon">›</div>
      </div>
      <div class="layer-body">
        ${l.sections.map(s => renderSection(s, l.color)).join('')}
      </div>
    </div>
  `).join('');

  // open all by default
  layers.forEach((_, i) => {
    document.getElementById(`layer-${i}`).classList.add('open');
  });
}

function renderSection(s, color) {
  let content = '';

  if (s.table) {
    content += `
      <table class="decision-table">
        <thead><tr>${s.table.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${s.table.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    `;
    if (s.extra) content += `<div class="callout" style="--accent-color:${color}">${s.extra}</div>`;
  }

  if (s.items) {
    content += `<div class="item-grid">`;
    content += s.items.map((item, idx) => `
      <div class="item${item.ai ? ' ai-item' : ''}" onclick="toggleItem(this)">
        <div class="item-name">
          <span class="dot"></span>
          ${item.name}${item.ai ? '<span class="ai-badge">AI</span>' : ''}
        </div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-expand-hint">点击展开详情</div>
      </div>
    `).join('');
    content += `</div>`;
    if (s.extra) content += `<div class="callout" style="--accent-color:${color}">${s.extra}</div>`;
  }

  return `
    <div class="section" style="--accent-color:${color}">
      <div class="section-title">${s.title}</div>
      ${content}
    </div>
  `;
}

// ════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════
function toggleItem(el) {
  el.classList.toggle('expanded');
}

function toggleLayer(i) {
  const card = document.getElementById(`layer-${i}`);
  card.classList.toggle('open');
}

function scrollToLayer(i) {
  document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
  document.getElementById(`nav-${i}`).classList.add('active');
  document.getElementById(`layer-${i}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
  if (!document.getElementById(`layer-${i}`).classList.contains('open')) {
    document.getElementById(`layer-${i}`).classList.add('open');
  }
}

function goToDetail(i) {
  switchView('detail');
  setTimeout(() => scrollToLayer(i), 100);
}

let currentView = 'overview';
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view-btn')[v === 'overview' ? 0 : 1].classList.add('active');

  if (v === 'overview') {
    document.getElementById('overview-view').style.display = 'grid';
    document.getElementById('detail-view').classList.remove('active');
  } else {
    document.getElementById('overview-view').style.display = 'none';
    document.getElementById('detail-view').classList.add('active');
  }
}

// Intersection observer for nav highlighting
function setupNavObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        const i = id.split('-')[1];
        document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
        const chip = document.getElementById(`nav-${i}`);
        if (chip) chip.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });

  layers.forEach((_, i) => {
    const el = document.getElementById(`layer-${i}`);
    if (el) observer.observe(el);
  });
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
renderOverview();
renderDetail();
setTimeout(setupNavObserver, 500);
</script>
